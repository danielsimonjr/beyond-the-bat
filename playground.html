function buildSimulation() {
  var v = el("div", {class:"view", id:"simulation"});
  v.appendChild(el("h1", null, "RSP Simulation"));
  v.appendChild(el("p", {style:{marginBottom:"16px",color:"var(--text2)"}},
    "Interactive toy simulation of the Recursive Social Prediction algorithm (\u00A7E.9). " +
    "Select an organism preset or tune parameters manually. Each timestep runs one full RSP loop: " +
    "interoceptive input \u2192 core affect \u2192 schema integration \u2192 conceptual categorization \u2192 recursive self-modeling \u2192 temporal prediction."));

  // ── Simulation engine (all state closured) ───────────────────────────

  var PRESETS = {
    "Invertebrate":       {nS:1, dMax:0, nC:0, nO:0, beta0:0.3, gamma:0.5},
    "Fish / Reptile":     {nS:2, dMax:0, nC:0, nO:0, beta0:0.3, gamma:0.5},
    "Non-social Mammal":  {nS:4, dMax:0, nC:0, nO:0, beta0:0.3, gamma:0.5},
    "Social Mammal":      {nS:5, dMax:1, nC:0, nO:3, beta0:0.3, gamma:0.5},
    "Corvid":             {nS:4, dMax:1, nC:0, nO:2, beta0:0.3, gamma:0.5},
    "Great Ape":          {nS:5, dMax:2, nC:3, nO:4, beta0:0.4, gamma:0.6},
    "Human":              {nS:5, dMax:4, nC:5, nO:5, beta0:0.3, gamma:0.5}
  };

  var CONCEPT_NAMES = ["calm", "alert", "anxious", "curious", "social"];
  var SCHEMA_NAMES  = ["body", "spatial", "aff-hom", "attention", "self"];
  var LEVEL_COLORS  = {1:"#ff6b6b", 2:"#ffd93d", 3:"#4ecdc4"};

  // Dimensions
  var N_E = 8, N_M = 8, N_SCH = 4, N_INTERO = 8;

  // ── Tiny linear algebra ───────────────────────────────────────────────

  function zeros(n) { return new Float64Array(n); }
  function randn() { var u = 1 - Math.random(), v = Math.random(); return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v); }
  function xavier(rows, cols) {
    var s = Math.sqrt(2/(rows+cols)), a = new Float64Array(rows*cols);
    for (var i=0;i<a.length;i++) a[i]=randn()*s;
    return {data:a,rows:rows,cols:cols};
  }
  function matVec(W, x) {
    var out = new Float64Array(W.rows);
    for (var r=0;r<W.rows;r++) { var s=0; for (var c=0;c<W.cols;c++) s+=W.data[r*W.cols+c]*x[c]; out[r]=s; }
    return out;
  }
  function vecAdd(a,b) { var o=new Float64Array(a.length); for(var i=0;i<a.length;i++) o[i]=a[i]+b[i]; return o; }
  function vecSub(a,b) { var o=new Float64Array(a.length); for(var i=0;i<a.length;i++) o[i]=a[i]-b[i]; return o; }
  function vecScale(a,s) { var o=new Float64Array(a.length); for(var i=0;i<a.length;i++) o[i]=a[i]*s; return o; }
  function vecNorm(v) { var s=0; for(var i=0;i<v.length;i++) s+=v[i]*v[i]; return Math.sqrt(s); }
  function tanhVec(v) { var o=new Float64Array(v.length); for(var i=0;i<v.length;i++) o[i]=Math.tanh(v[i]); return o; }
  function simConcat() {
    var len=0; for(var i=0;i<arguments.length;i++) len+=arguments[i].length;
    var o=new Float64Array(len), off=0;
    for(var i=0;i<arguments.length;i++){ for(var j=0;j<arguments[i].length;j++) o[off++]=arguments[i][j]; }
    return o;
  }
  function softmax(logits) {
    var max=-Infinity; for(var i=0;i<logits.length;i++) if(logits[i]>max) max=logits[i];
    var sum=0, o=new Float64Array(logits.length);
    for(var i=0;i<logits.length;i++){ o[i]=Math.exp(logits[i]-max); sum+=o[i]; }
    for(var i=0;i<o.length;i++) o[i]/=sum;
    return o;
  }
  function simArgmax(a) { var m=0; for(var i=1;i<a.length;i++) if(a[i]>a[m]) m=i; return m; }

  // ── Simulation state ──────────────────────────────────────────────────

  var sim = null; // initialized on first open

  function initWeights() {
    var w = {};
    w.Pi1 = xavier(N_E, N_INTERO);
    w.Wsch = [];
    for (var k=0;k<5;k++) w.Wsch.push(xavier(N_SCH, N_SCH + N_INTERO + N_E));
    w.Wint = xavier(N_E, N_E + 5*N_SCH);
    w.Hc = [];
    for (var k=0;k<5;k++) { var h=new Float64Array(N_E); for(var i=0;i<N_E;i++) h[i]=randn()*0.5; w.Hc.push(h); }
    w.Wcon = xavier(5, N_E);
    w.Wexp = xavier(N_E, N_E + N_E);
    w.Wother = []; w.Bother = [];
    for (var j=0;j<5;j++) {
      w.Wother.push(xavier(N_M, N_M));
      var b=new Float64Array(N_M); for(var i=0;i<N_M;i++) b[i]=randn()*0.1; w.Bother.push(b);
    }
    w.Wpred = xavier(N_E, N_M);
    w.Wself = xavier(N_M, N_M + N_E);
    return w;
  }

  function resetSim() {
    var wasRunning = sim && sim.running;
    if (wasRunning && sim.animFrame) clearTimeout(sim.animFrame);
    var p = getCurrentParams();
    sim = {
      t: 0, intero: zeros(N_INTERO), phase: Math.random()*Math.PI*2,
      epsilon1: zeros(N_E), a: zeros(N_E),
      schemas: [zeros(N_SCH),zeros(N_SCH),zeros(N_SCH),zeros(N_SCH),zeros(N_SCH)],
      z: zeros(N_E), conceptIdx: -1, conceptProb: 0,
      e: zeros(N_E), M: zeros(N_M), e_hat: zeros(N_E), e_hat_prev: zeros(N_E), predError: 0,
      convergence: [], rho: 0, W: initWeights(), params: p,
      valenceHist: [], arousalHist: [], rhoHist: [], errorHist: [],
      running: false, animFrame: null
    };
    ctlRun.textContent = "Run";
    ctlRun.style.borderColor = "var(--border)";
    ctlRun.style.color = "var(--text)";
    updateAllDisplays();
  }

  function getCurrentParams() {
    return {
      nS:    parseInt(ctlSchemas.value)  || 0,
      dMax:  parseInt(ctlDmax.value)     || 0,
      nC:    parseInt(ctlConcepts.value) || 0,
      nO:    parseInt(ctlOthers.value)   || 0,
      beta0: parseFloat(ctlBeta.value)   || 0.3,
      gamma: parseFloat(ctlGamma.value)  || 0.5
    };
  }

  // ── RSP Step ──────────────────────────────────────────────────────────

  function stepSim() {
    if (!sim) return;
    var p = sim.params;
    var W = sim.W;
    sim.t++;

    // Interoceptive input: drifting sine waves + noise
    sim.phase += 0.07;
    for (var i=0;i<N_INTERO;i++) {
      sim.intero[i] = 0.6*Math.sin(sim.phase + i*0.8) + 0.3*Math.sin(sim.phase*0.3 + i*1.5) + randn()*0.15;
    }

    // Level 1: Core Affect
    sim.a = tanhVec(matVec(W.Pi1, sim.intero));

    // Level 2: Schema Integration
    var nS = Math.min(p.nS, 5);
    for (var k=0;k<5;k++) {
      if (k < nS) {
        var inp = simConcat(sim.schemas[k], sim.intero, sim.a);
        sim.schemas[k] = tanhVec(matVec(W.Wsch[k], inp));
      } else {
        sim.schemas[k] = zeros(N_SCH);
      }
    }
    var schAll = simConcat(sim.a, sim.schemas[0], sim.schemas[1], sim.schemas[2], sim.schemas[3], sim.schemas[4]);
    sim.z = tanhVec(matVec(W.Wint, schAll));

    // Level 3a: Conceptual Categorization
    if (p.nC > 0) {
      var logits = matVec(W.Wcon, sim.z);
      for (var i=p.nC;i<5;i++) logits[i] = -1e9;
      var probs = softmax(logits);
      sim.conceptIdx = simArgmax(probs);
      sim.conceptProb = probs[sim.conceptIdx];
      sim.e = tanhVec(matVec(W.Wexp, simConcat(sim.z, W.Hc[sim.conceptIdx])));
    } else {
      sim.conceptIdx = -1;
      sim.conceptProb = 0;
      sim.e = new Float64Array(sim.z);
    }

    // Level 3b: Recursive Social Prediction (strange loop)
    sim.M = tanhVec(matVec(W.Wself, simConcat(sim.M, sim.e)));
    sim.convergence = [];
    if (p.dMax > 0 && p.nO > 0) {
      for (var d=0;d<p.dMax;d++) {
        var M_prev = new Float64Array(sim.M);
        var M_agg = zeros(N_M);
        var nO = Math.min(p.nO, 5);
        for (var j=0;j<nO;j++) {
          var M_hat_j = tanhVec(vecAdd(matVec(W.Wother[j], sim.M), W.Bother[j]));
          M_agg = vecAdd(M_agg, vecScale(M_hat_j, 1/nO));
        }
        var beta_d = p.beta0 * Math.pow(p.gamma, d);
        sim.M = tanhVec(vecAdd(vecScale(sim.M, 1-beta_d), vecScale(M_agg, beta_d)));
        sim.convergence.push(vecNorm(vecSub(sim.M, M_prev)));
      }
      if (sim.convergence.length >= 2) {
        var last = sim.convergence[sim.convergence.length-1];
        var prev = sim.convergence[sim.convergence.length-2];
        sim.rho = prev > 1e-10 ? last/prev : 0;
      } else {
        sim.rho = sim.convergence[0] || 0;
      }
    } else {
      sim.rho = 0;
    }

    // Temporal Prediction
    sim.e_hat_prev = new Float64Array(sim.e_hat);
    sim.e_hat = tanhVec(matVec(W.Wpred, sim.M));
    sim.predError = vecNorm(vecSub(sim.e, sim.e_hat_prev));

    // History (keep last 60)
    sim.valenceHist.push(sim.a[0]);
    sim.arousalHist.push(Math.abs(sim.a[1]));
    sim.rhoHist.push(sim.rho);
    sim.errorHist.push(sim.predError);
    if (sim.valenceHist.length > 60) {
      sim.valenceHist.shift(); sim.arousalHist.shift();
      sim.rhoHist.shift(); sim.errorHist.shift();
    }
    updateAllDisplays();
  }

  // ── Display helpers ───────────────────────────────────────────────────

  function heatColor(val) {
    var r,g,b;
    if (val >= 0) { r=Math.round(val*220); g=Math.round(val*60); b=Math.round(30+val*20); }
    else { var av=-val; r=Math.round(av*30); g=Math.round(av*80); b=Math.round(av*220); }
    return "rgb("+r+","+g+","+b+")";
  }

  function valenceColor(val) {
    if (val >= 0) return "rgb("+Math.round(180+val*75)+","+Math.round(100-val*60)+","+Math.round(100-val*60)+")";
    var av=-val; return "rgb("+Math.round(100-av*60)+","+Math.round(120-av*40)+","+Math.round(180+av*75)+")";
  }

  function renderBar(container, value, min, max, colorFn) {
    var pct = ((value-min)/(max-min))*100;
    pct = Math.max(0,Math.min(100,pct));
    container.style.background = "var(--surface2)";
    container.style.borderRadius = "4px";
    container.style.height = "14px";
    container.style.position = "relative";
    container.style.overflow = "hidden";
    var inner = container.firstChild;
    if (!inner || !inner.dataset.simbar) {
      inner = document.createElement("div");
      inner.dataset.simbar = "1";
      inner.style.position = "absolute";
      inner.style.top = "0";
      inner.style.height = "100%";
      inner.style.borderRadius = "4px";
      inner.style.transition = "width 0.15s, left 0.15s, background 0.15s";
      while (container.firstChild) container.removeChild(container.firstChild);
      container.appendChild(inner);
    }
    if (min < 0) {
      var center = (-min/(max-min))*100;
      if (value >= 0) { inner.style.left = center+"%"; inner.style.width = (pct-center)+"%"; }
      else { inner.style.left = pct+"%"; inner.style.width = (center-pct)+"%"; }
    } else {
      inner.style.left = "0";
      inner.style.width = pct+"%";
    }
    inner.style.background = colorFn ? colorFn(value) : "var(--accent)";
  }

  function renderHeatStrip(container, arr) {
    container.style.display = "flex";
    container.style.gap = "2px";
    container.style.height = "18px";
    while (container.children.length < arr.length) {
      var cell = document.createElement("div");
      cell.style.flex = "1";
      cell.style.borderRadius = "2px";
      cell.style.transition = "background 0.15s";
      container.appendChild(cell);
    }
    while (container.children.length > arr.length) container.removeChild(container.lastChild);
    for (var i=0;i<arr.length;i++) container.children[i].style.background = heatColor(arr[i]);
  }

  function renderSparkline(container, data, maxVal, color) {
    container.style.display = "flex";
    container.style.alignItems = "flex-end";
    container.style.gap = "1px";
    container.style.height = "32px";
    while (container.children.length < data.length) {
      var bar = document.createElement("div");
      bar.style.flex = "1";
      bar.style.minWidth = "2px";
      bar.style.borderRadius = "1px 1px 0 0";
      bar.style.transition = "height 0.1s";
      container.appendChild(bar);
    }
    while (container.children.length > data.length) container.removeChild(container.lastChild);
    var mx = maxVal || Math.max.apply(null, data.map(Math.abs)) || 1;
    for (var i=0;i<data.length;i++) {
      var h = Math.max(1, Math.abs(data[i])/mx * 30);
      container.children[i].style.height = h+"px";
      container.children[i].style.background = color || "var(--accent)";
    }
  }

  function consciousnessType(p) {
    if (p.dMax >= 3 && p.nC >= 3 && p.nO >= 3) return "Full recursive self-aware consciousness (Levels 1+2+3a+3b)";
    if (p.dMax >= 1 && p.nO >= 1 && p.nC > 0) return "Social consciousness with concepts (Levels 1+2+3a+partial 3b)";
    if (p.dMax >= 1 && p.nO >= 1) return "Social consciousness without concepts (Levels 1+2+partial 3b)";
    if (p.nC > 0) return "Categorized affect (Levels 1+2+3a, no recursion)";
    if (p.nS >= 4) return "Schema-structured affect (Levels 1+2, mammalian-grade)";
    if (p.nS >= 2) return "Basic schematic affect (Levels 1+partial 2, vertebrate-grade)";
    if (p.nS >= 1) return "Minimal affect (Level 1 + body schema, invertebrate-grade)";
    return "Raw valence only (Level 1)";
  }

  // ── UI references ─────────────────────────────────────────────────────

  var ctlPreset, ctlSchemas, ctlDmax, ctlConcepts, ctlOthers, ctlBeta, ctlGamma;
  var ctlStep, ctlRun, ctlReset, ctlTimestep;
  var dispValenceBar, dispValenceVal, dispArousalBar, dispArousalVal;
  var dispSchBars = [], dispSchLabels = [];
  var dispZStrip;
  var dispConceptName, dispConceptBar;
  var dispRho, dispConvSpark;
  var dispEStrip, dispMStrip, dispEhatStrip;
  var dispConsType;
  var dispValenceSpark, dispErrorSpark;

  function updateAllDisplays() {
    if (!sim) return;
    var p = sim.params;
    ctlTimestep.textContent = "t = " + sim.t;

    // Level 1
    var valence = sim.a[0], arousal = Math.abs(sim.a[1]);
    renderBar(dispValenceBar, valence, -1, 1, valenceColor);
    dispValenceVal.textContent = valence.toFixed(3);
    renderBar(dispArousalBar, arousal, 0, 1, function() { return "#ffd93d"; });
    dispArousalVal.textContent = arousal.toFixed(3);

    // Level 2
    for (var k=0;k<5;k++) {
      var active = k < p.nS;
      dispSchLabels[k].style.opacity = active ? "1" : "0.25";
      dispSchBars[k].style.opacity = active ? "1" : "0.25";
      var schNorm = active ? vecNorm(sim.schemas[k]) / 2 : 0;
      renderBar(dispSchBars[k], schNorm, 0, 1, function() { return "#ffd93d"; });
    }
    renderHeatStrip(dispZStrip, sim.z);

    // Level 3a
    if (p.nC > 0 && sim.conceptIdx >= 0) {
      dispConceptName.textContent = CONCEPT_NAMES[sim.conceptIdx];
      dispConceptName.style.color = "var(--accent3)";
      renderBar(dispConceptBar, sim.conceptProb, 0, 1, function() { return "var(--accent3)"; });
    } else {
      dispConceptName.textContent = p.nC > 0 ? "\u2014" : "(no concepts)";
      dispConceptName.style.color = "var(--text2)";
      renderBar(dispConceptBar, 0, 0, 1, function() { return "var(--text2)"; });
    }

    // Level 3b
    if (p.dMax > 0 && p.nO > 0) {
      dispRho.textContent = "\u03C1 = " + sim.rho.toFixed(4);
      dispRho.style.color = sim.rho < 1 ? "#4ecdc4" : "#ff6b6b";
      renderSparkline(dispConvSpark, sim.convergence, undefined, sim.rho < 1 ? "#4ecdc4" : "#ff6b6b");
    } else {
      dispRho.textContent = "\u03C1 = \u2014";
      dispRho.style.color = "var(--text2)";
      while (dispConvSpark.firstChild) dispConvSpark.removeChild(dispConvSpark.firstChild);
    }

    // Phenomenal state
    renderHeatStrip(dispEStrip, sim.e);
    renderHeatStrip(dispMStrip, sim.M);
    renderHeatStrip(dispEhatStrip, sim.e_hat);
    dispConsType.textContent = consciousnessType(p);

    // Sparklines
    renderSparkline(dispValenceSpark, sim.valenceHist, 1, "var(--accent)");
    renderSparkline(dispErrorSpark, sim.errorHist, 2, "var(--accent2)");
  }

  // ── Build UI ──────────────────────────────────────────────────────────

  // --- Control Panel ---
  var controls = el("div", {class:"card", style:{marginBottom:"16px"}});
  controls.appendChild(el("div", {class:"card-label"}, "Control Panel"));

  var ctrlGrid = el("div", {style:{display:"grid",gridTemplateColumns:"1fr 2fr 1fr",gap:"16px",alignItems:"start"}});

  // Preset dropdown
  var presetCol = el("div");
  presetCol.appendChild(el("div", {style:{fontSize:"12px",color:"var(--text2)",marginBottom:"6px",textTransform:"uppercase",letterSpacing:"1px"}}, "Organism Preset"));
  ctlPreset = el("select", {style:{width:"100%",padding:"8px 10px",background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:"8px",color:"var(--text)",fontSize:"14px"}});
  Object.keys(PRESETS).forEach(function(k) {
    ctlPreset.appendChild(el("option", {value:k}, k));
  });
  ctlPreset.value = "Human";
  ctlPreset.addEventListener("change", function() {
    var pr = PRESETS[ctlPreset.value];
    if (!pr) return;
    ctlSchemas.value = pr.nS;
    ctlDmax.value = pr.dMax;
    ctlConcepts.value = pr.nC;
    ctlOthers.value = pr.nO;
    ctlBeta.value = pr.beta0;
    ctlGamma.value = pr.gamma;
    updateParamLabels();
    resetSim();
  });
  presetCol.appendChild(ctlPreset);
  ctrlGrid.appendChild(presetCol);

  // Parameter sliders
  var paramCol = el("div");
  paramCol.appendChild(el("div", {style:{fontSize:"12px",color:"var(--text2)",marginBottom:"6px",textTransform:"uppercase",letterSpacing:"1px"}}, "Parameters"));
  var paramGrid = el("div", {style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"8px"}});

  function makeSlider(label, min, max, step, defVal) {
    var wrap = el("div");
    var lbl = el("div", {style:{fontSize:"12px",color:"var(--text2)",marginBottom:"2px"}});
    lbl.textContent = label + ": " + defVal;
    var inp = el("input", {type:"range",min:String(min),max:String(max),step:String(step),value:String(defVal),
      style:{width:"100%",accentColor:"var(--accent)"}});
    inp.addEventListener("input", function() { lbl.textContent = label + ": " + inp.value; });
    wrap.appendChild(lbl);
    wrap.appendChild(inp);
    return {wrap:wrap, input:inp, label:lbl};
  }

  var sl;
  sl = makeSlider("|S| schemas", 0, 5, 1, 5);   ctlSchemas  = sl.input; paramGrid.appendChild(sl.wrap); var lblSchemas = sl.label;
  sl = makeSlider("D_max depth", 0, 5, 1, 4);    ctlDmax     = sl.input; paramGrid.appendChild(sl.wrap); var lblDmax = sl.label;
  sl = makeSlider("|C| concepts", 0, 5, 1, 5);   ctlConcepts = sl.input; paramGrid.appendChild(sl.wrap); var lblConcepts = sl.label;
  sl = makeSlider("|O| others", 0, 5, 1, 5);     ctlOthers   = sl.input; paramGrid.appendChild(sl.wrap); var lblOthers = sl.label;
  sl = makeSlider("\u03B2\u2080", 0.1, 0.9, 0.05, 0.3); ctlBeta = sl.input; paramGrid.appendChild(sl.wrap); var lblBeta = sl.label;
  sl = makeSlider("\u03B3", 0.1, 0.9, 0.05, 0.5);       ctlGamma = sl.input; paramGrid.appendChild(sl.wrap); var lblGamma = sl.label;

  function updateParamLabels() {
    lblSchemas.textContent  = "|S| schemas: " + ctlSchemas.value;
    lblDmax.textContent     = "D_max depth: " + ctlDmax.value;
    lblConcepts.textContent = "|C| concepts: " + ctlConcepts.value;
    lblOthers.textContent   = "|O| others: " + ctlOthers.value;
    lblBeta.textContent     = "\u03B2\u2080: " + ctlBeta.value;
    lblGamma.textContent    = "\u03B3: " + ctlGamma.value;
  }

  [ctlSchemas, ctlDmax, ctlConcepts, ctlOthers, ctlBeta, ctlGamma].forEach(function(inp) {
    inp.addEventListener("input", function() { if (sim) sim.params = getCurrentParams(); });
  });

  paramCol.appendChild(paramGrid);
  ctrlGrid.appendChild(paramCol);

  // Buttons + timestep
  var btnCol = el("div", {style:{textAlign:"center"}});
  btnCol.appendChild(el("div", {style:{fontSize:"12px",color:"var(--text2)",marginBottom:"6px",textTransform:"uppercase",letterSpacing:"1px"}}, "Controls"));

  var btnStyle = {padding:"8px 16px",borderRadius:"8px",border:"1px solid var(--border)",background:"var(--surface2)",color:"var(--text)",cursor:"pointer",fontSize:"14px",fontWeight:"600"};

  ctlStep = el("button", {style:Object.assign({},btnStyle)}, "Step");
  ctlStep.addEventListener("click", function() { if (sim) stepSim(); });

  ctlRun = el("button", {style:Object.assign({},btnStyle,{minWidth:"72px"})}, "Run");
  ctlRun.addEventListener("click", function() {
    if (!sim) return;
    sim.running = !sim.running;
    ctlRun.textContent = sim.running ? "Pause" : "Run";
    ctlRun.style.borderColor = sim.running ? "var(--accent3)" : "var(--border)";
    ctlRun.style.color = sim.running ? "var(--accent3)" : "var(--text)";
    if (sim.running) runLoop();
  });

  ctlReset = el("button", {style:Object.assign({},btnStyle)}, "Reset");
  ctlReset.addEventListener("click", function() {
    if (sim && sim.running) {
      sim.running = false;
      if (sim.animFrame) clearTimeout(sim.animFrame);
    }
    resetSim();
  });

  ctlTimestep = el("div", {style:{fontSize:"20px",fontWeight:"700",color:"var(--accent)",marginTop:"12px",fontFamily:"'Cascadia Code','Fira Code',monospace"}}, "t = 0");

  var btnRow = el("div", {style:{display:"flex",justifyContent:"center",gap:"6px"}});
  btnRow.appendChild(ctlStep); btnRow.appendChild(ctlRun); btnRow.appendChild(ctlReset);
  btnCol.appendChild(btnRow);
  btnCol.appendChild(ctlTimestep);
  ctrlGrid.appendChild(btnCol);

  controls.appendChild(ctrlGrid);
  v.appendChild(controls);

  // ── Run loop ──
  function runLoop() {
    if (!sim || !sim.running) return;
    stepSim();
    sim.animFrame = setTimeout(function() { requestAnimationFrame(runLoop); }, 180);
  }

  // --- Main Visualization (three columns) ---
  var vizGrid = el("div", {style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"16px",marginBottom:"16px"}});

  // Column 1: Level 1 Core Affect
  var col1 = el("div", {class:"card", style:{borderLeft:"3px solid "+LEVEL_COLORS[1]}});
  col1.appendChild(el("div", {style:{fontSize:"12px",fontWeight:"700",textTransform:"uppercase",letterSpacing:"1px",color:LEVEL_COLORS[1],marginBottom:"12px"}}, "Level 1: Core Affect"));

  col1.appendChild(el("div", {style:{fontSize:"12px",color:"var(--text2)",marginBottom:"4px"}}, "Valence (\u22121 to +1)"));
  dispValenceBar = el("div", {style:{marginBottom:"4px"}});
  dispValenceVal = el("div", {style:{fontSize:"13px",color:"var(--text)",textAlign:"right",fontFamily:"monospace",marginBottom:"12px"}}, "0.000");
  col1.appendChild(dispValenceBar); col1.appendChild(dispValenceVal);

  col1.appendChild(el("div", {style:{fontSize:"12px",color:"var(--text2)",marginBottom:"4px"}}, "Arousal (0 to 1)"));
  dispArousalBar = el("div", {style:{marginBottom:"4px"}});
  dispArousalVal = el("div", {style:{fontSize:"13px",color:"var(--text)",textAlign:"right",fontFamily:"monospace",marginBottom:"12px"}}, "0.000");
  col1.appendChild(dispArousalBar); col1.appendChild(dispArousalVal);

  col1.appendChild(el("div", {style:{fontSize:"12px",color:"var(--text2)",marginBottom:"4px",marginTop:"8px"}}, "Valence history"));
  dispValenceSpark = el("div", {style:{height:"32px"}});
  col1.appendChild(dispValenceSpark);
  vizGrid.appendChild(col1);

  // Column 2: Level 2 Schemas
  var col2 = el("div", {class:"card", style:{borderLeft:"3px solid "+LEVEL_COLORS[2]}});
  col2.appendChild(el("div", {style:{fontSize:"12px",fontWeight:"700",textTransform:"uppercase",letterSpacing:"1px",color:LEVEL_COLORS[2],marginBottom:"12px"}}, "Level 2: Schemas"));

  for (var k=0;k<5;k++) {
    var schRow = el("div", {style:{display:"flex",alignItems:"center",gap:"8px",marginBottom:"6px"}});
    var schLbl = el("div", {style:{fontSize:"12px",color:"var(--text2)",width:"65px",textAlign:"right"}}, SCHEMA_NAMES[k]);
    var schBar = el("div", {style:{flex:"1"}});
    schRow.appendChild(schLbl); schRow.appendChild(schBar);
    col2.appendChild(schRow);
    dispSchLabels.push(schLbl); dispSchBars.push(schBar);
  }

  col2.appendChild(el("div", {style:{fontSize:"12px",color:"var(--text2)",marginTop:"12px",marginBottom:"4px"}}, "Integration z(t)"));
  dispZStrip = el("div");
  col2.appendChild(dispZStrip);
  vizGrid.appendChild(col2);

  // Column 3: Level 3 Prediction
  var col3 = el("div", {class:"card", style:{borderLeft:"3px solid "+LEVEL_COLORS[3]}});
  col3.appendChild(el("div", {style:{fontSize:"12px",fontWeight:"700",textTransform:"uppercase",letterSpacing:"1px",color:LEVEL_COLORS[3],marginBottom:"12px"}}, "Level 3: Prediction"));

  col3.appendChild(el("div", {style:{fontSize:"12px",color:"var(--text2)",marginBottom:"4px"}}, "3a: Selected concept"));
  dispConceptName = el("div", {style:{fontSize:"18px",fontWeight:"700",color:"var(--accent3)",marginBottom:"4px"}}, "\u2014");
  dispConceptBar = el("div", {style:{marginBottom:"16px"}});
  col3.appendChild(dispConceptName); col3.appendChild(dispConceptBar);

  col3.appendChild(el("div", {style:{fontSize:"12px",color:"var(--text2)",marginBottom:"4px"}}, "3b: Contraction coefficient"));
  dispRho = el("div", {style:{fontSize:"22px",fontWeight:"700",fontFamily:"monospace",color:"var(--text2)",marginBottom:"4px"}}, "\u03C1 = \u2014");
  col3.appendChild(dispRho);

  col3.appendChild(el("div", {style:{fontSize:"12px",color:"var(--text2)",marginBottom:"4px"}}, "Convergence by depth"));
  dispConvSpark = el("div", {style:{height:"32px"}});
  col3.appendChild(dispConvSpark);

  col3.appendChild(el("div", {style:{fontSize:"12px",color:"var(--text2)",marginTop:"12px",marginBottom:"4px"}}, "Prediction error history"));
  dispErrorSpark = el("div", {style:{height:"32px"}});
  col3.appendChild(dispErrorSpark);
  vizGrid.appendChild(col3);

  v.appendChild(vizGrid);

  // --- Phenomenal State (bottom bar) ---
  var phenom = el("div", {class:"card", style:{marginBottom:"16px"}});
  phenom.appendChild(el("div", {class:"card-label"}, "Phenomenal State \u03A6(t) = \u27E8e(t), M(t), \u00EA(t+1)\u27E9"));

  var phenGrid = el("div", {style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"16px",marginTop:"12px"}});

  var pCol1 = el("div");
  pCol1.appendChild(el("div", {style:{fontSize:"12px",color:LEVEL_COLORS[3],marginBottom:"4px",fontWeight:"600"}}, "e(t) experience"));
  dispEStrip = el("div"); pCol1.appendChild(dispEStrip); phenGrid.appendChild(pCol1);

  var pCol2 = el("div");
  pCol2.appendChild(el("div", {style:{fontSize:"12px",color:"var(--accent)",marginBottom:"4px",fontWeight:"600"}}, "M(t) self-model"));
  dispMStrip = el("div"); pCol2.appendChild(dispMStrip); phenGrid.appendChild(pCol2);

  var pCol3 = el("div");
  pCol3.appendChild(el("div", {style:{fontSize:"12px",color:"var(--accent2)",marginBottom:"4px",fontWeight:"600"}}, "\u00EA(t+1) prediction"));
  dispEhatStrip = el("div"); pCol3.appendChild(dispEhatStrip); phenGrid.appendChild(pCol3);

  phenom.appendChild(phenGrid);

  dispConsType = el("div", {style:{marginTop:"12px",fontSize:"14px",color:"var(--text)",fontWeight:"600",textAlign:"center",padding:"10px",background:"var(--surface2)",borderRadius:"8px"}}, "\u2014");
  phenom.appendChild(dispConsType);
  v.appendChild(phenom);

  // --- Legend ---
  var legend = el("div", {class:"card"});
  legend.appendChild(el("div", {class:"card-label"}, "How to Read This Simulation"));

  var leg1 = el("p");
  leg1.appendChild(el("strong", {style:{color:"#ff6b6b"}}, "Level 1"));
  leg1.appendChild(document.createTextNode(" receives drifting interoceptive signals (sine waves + noise) and maps them to core affect (valence/arousal) via precision-weighted prediction error. "));
  leg1.appendChild(el("strong", {style:{color:"#ffd93d"}}, "Level 2"));
  leg1.appendChild(document.createTextNode(" updates five schemas (body, spatial, affective-homeostatic, attention, self) and integrates them with affect into structured representation z(t). "));
  leg1.appendChild(el("strong", {style:{color:"var(--accent3)"}}, "Level 3a"));
  leg1.appendChild(document.createTextNode(" selects the best-matching emotion concept. "));
  leg1.appendChild(el("strong", {style:{color:"var(--accent)"}}, "Level 3b"));
  leg1.appendChild(document.createTextNode(" runs the strange loop: other-agents predict how they see M, the self-model is updated, and this recurses D_max times. The "));
  leg1.appendChild(el("strong", null, "contraction coefficient \u03C1"));
  leg1.appendChild(document.createTextNode(" should converge below 1, indicating stable self-modeling. Heatmap strips show the raw 8-dimensional vectors; blue = negative, red = positive."));
  legend.appendChild(leg1);

  var leg2 = el("p", {style:{marginTop:"8px"}},
    "Try switching organism presets to see how consciousness emerges with increasing architectural complexity. " +
    "Most invertebrates have only Level 1 (cephalopods show Level 1-2); fish add schemas; social mammals add the strange loop; humans add concepts and deep recursion.");
  legend.appendChild(leg2);

  v.appendChild(legend);

  // Expose reset for deferred init
  window._simReset = resetSim;

  return v;
}

// Deferred initialization function called when simulation tab is first opened
function initSimulation() {
  if (typeof window._simReset === "function") window._simReset();
}

// Build everything
const main = document.getElementById("mainContent");
buildTabs();
main.appendChild(buildOverview());
main.appendChild(buildArchitecture());
main.appendChild(buildCoreAffect());
main.appendChild(buildCoreSchemas());
main.appendChild(buildLevel3());
main.appendChild(buildRSP());
main.appendChild(buildClinical());
main.appendChild(buildDeprivation());
main.appendChild(buildPredictions());
main.appendChild(buildArguments());
main.appendChild(buildSections());
main.appendChild(buildCritics());
main.appendChild(buildBrain());
main.appendChild(buildEvolution());
main.appendChild(buildLineage());
main.appendChild(buildQuestions());
main.appendChild(buildTheories());
main.appendChild(buildAppendixes());
main.appendChild(buildReferences());
main.appendChild(buildSimulation());

// Initialize Mermaid (startOnLoad:false because RSP tab is hidden initially)
if (typeof mermaid !== "undefined") {
  mermaid.initialize({
    startOnLoad: false,
    theme: "dark",
    themeVariables: {
      darkMode: true,
      background: "#131a2b",
      primaryColor: "#1a2535",
      primaryBorderColor: "#6c63ff",
      primaryTextColor: "#e8e6e3",
      secondaryColor: "#1a2340",
      tertiaryColor: "#0e1a1a",
      lineColor: "#4a5580",
      textColor: "#e8e6e3",
      fontSize: "14px"
    }
  });
}

// Footer
const footer = el("div", {class:"footer"});
footer.appendChild(el("p", null, "Beyond the Bat \u2014 Interactive Playground"));
footer.appendChild(el("p", {style:{marginTop:"4px"}}, "Built with the RLM Skill (Recursive Language Model Processing) \u2014 574K chars across 12 documents processed via sub-LLM chunking and aggregation"));
main.appendChild(footer);

// Keyboard nav
document.addEventListener("keydown", e => {
  if (e.target.tagName === "INPUT") return;
  const tabs = [...document.querySelectorAll(".tab")];
  const idx = tabs.findIndex(t => t.classList.contains("active"));
  if ((e.key === "ArrowDown" || e.key === "ArrowRight") && idx < tabs.length - 1) { e.preventDefault(); tabs[idx + 1].click(); }
  if ((e.key === "ArrowUp" || e.key === "ArrowLeft") && idx > 0) { e.preventDefault(); tabs[idx - 1].click(); }
});
</script>
</body>
</html>
