<title>Beyond the Bat — Interactive Philosophy Playground</title>
<style>
  :root {
    --bg: #0a0e17;
    --surface: #131a2b;
    --surface2: #1a2340;
    --accent: #6c63ff;
    --accent2: #ff6b6b;
    --accent3: #4ecdc4;
    --accent4: #ffd93d;
    --text: #e8e6e3;
    --text2: #9a97ae;
    --border: #2a3456;
    --glow: rgba(108,99,255,0.15);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height:100vh; }

  nav { position:fixed; top:0; left:0; bottom:0; z-index:100; width:200px; background: rgba(10,14,23,0.97); backdrop-filter:blur(12px); border-right:1px solid var(--border); display:flex; flex-direction:column; padding:20px 12px; overflow-y:auto; scrollbar-width:thin; scrollbar-color: var(--border) transparent; }
  nav::-webkit-scrollbar { width:4px; }
  nav::-webkit-scrollbar-track { background:transparent; }
  nav::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }
  nav .logo { font-size:16px; font-weight:700; color:var(--accent); margin-bottom:20px; padding:0 8px; }
  nav .tabs { display:flex; flex-direction:column; gap:2px; }
  nav .tab { padding:8px 12px; border-radius:8px; cursor:pointer; font-size:13px; color:var(--text2); transition:all .2s; white-space:nowrap; border:1px solid transparent; text-align:left; }
  nav .tab:hover { color:var(--text); background:var(--surface); }
  nav .tab.active { color:var(--accent); background:var(--glow); border-color:var(--accent); }

  main { margin-left:200px; max-width:1200px; padding:32px 24px 64px; }

  .view { display:none; }
  .view.active { display:block; animation: fadeIn .3s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

  h1 { font-size:32px; font-weight:700; margin-bottom:8px; background: linear-gradient(135deg, var(--accent), var(--accent3)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  h2 { font-size:22px; font-weight:600; margin:28px 0 12px; color:var(--accent3); }
  h3 { font-size:16px; font-weight:600; margin:16px 0 8px; color:var(--accent4); }
  p, li { line-height:1.7; color:var(--text2); font-size:15px; }

  .card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:24px; margin:16px 0; transition:border-color .2s; }
  .card:hover { border-color:var(--accent); }
  .card-label { font-size:11px; text-transform:uppercase; letter-spacing:1.5px; color:var(--accent); margin-bottom:8px; font-weight:600; }
  .card p { margin-top:8px; }

  .tag { display:inline-block; padding:4px 10px; border-radius:20px; font-size:12px; margin:2px 4px 2px 0; }
  .tag-purple { background:rgba(108,99,255,.15); color:#a29bfe; border:1px solid rgba(108,99,255,.3); }
  .tag-red { background:rgba(255,107,107,.12); color:#ff8a8a; border:1px solid rgba(255,107,107,.25); }
  .tag-green { background:rgba(78,205,196,.12); color:#6ee7de; border:1px solid rgba(78,205,196,.25); }
  .tag-gold { background:rgba(255,217,61,.1); color:#ffe066; border:1px solid rgba(255,217,61,.2); }

  .levels-diagram { display:flex; flex-direction:column; gap:0; margin:24px 0; }
  .level-box { padding:20px 24px; border-left:4px solid; }
  .level-1 { border-color:#ff6b6b; background:rgba(255,107,107,.06); border-radius:0 0 12px 12px; }
  .level-2 { border-color:#ffd93d; background:rgba(255,217,61,.04); }
  .level-3 { border-color:#4ecdc4; background:rgba(78,205,196,.06); border-radius:12px 12px 0 0; }
  .level-num { font-size:12px; font-weight:700; letter-spacing:1px; text-transform:uppercase; margin-bottom:6px; }
  .level-1 .level-num { color:#ff6b6b; }
  .level-2 .level-num { color:#ffd93d; }
  .level-3 .level-num { color:#4ecdc4; }
  .level-title { font-size:16px; font-weight:600; color:var(--text); margin-bottom:4px; }
  .level-desc { font-size:14px; color:var(--text2); line-height:1.6; }
  .arrow-down { text-align:center; font-size:20px; color:var(--border); padding:4px 0; }

  .arg-node { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:16px 20px; margin:10px 0; cursor:pointer; transition:all .25s; }
  .arg-node:hover { border-color:var(--accent); box-shadow:0 0 20px var(--glow); }
  .arg-title-row { font-weight:600; font-size:15px; color:var(--text); display:flex; justify-content:space-between; align-items:center; }
  .arg-title-row .chevron { transition:transform .2s; color:var(--text2); }
  .arg-section { font-size:12px; color:var(--accent); margin-top:4px; }
  .arg-detail { margin-top:12px; padding-top:12px; border-top:1px solid var(--border); }
  .arg-detail p { font-size:14px; }

  .critic-card { background:var(--surface); border-radius:12px; overflow:hidden; margin:16px 0; border:1px solid var(--border); }
  .critic-header { padding:16px 20px; cursor:pointer; display:flex; justify-content:space-between; align-items:center; }
  .critic-header h3 { margin:0; }
  .stance { padding:4px 12px; border-radius:20px; font-size:12px; font-weight:600; }
  .stance-mixed { background:rgba(255,217,61,.15); color:#ffe066; }
  .stance-critical { background:rgba(255,107,107,.15); color:#ff8a8a; }

  .objection { padding:12px 16px; background:var(--surface2); border-radius:8px; margin:8px 0; border-left:3px solid var(--accent2); font-size:14px; color:var(--text2); line-height:1.6; }
  .strength { padding:12px 16px; background:var(--surface2); border-radius:8px; margin:8px 0; border-left:3px solid var(--accent3); font-size:14px; color:var(--text2); line-height:1.6; }

  .timeline { position:relative; margin:24px 0; padding-left:32px; }
  .timeline::before { content:''; position:absolute; left:12px; top:0; bottom:0; width:2px; background:linear-gradient(to bottom, var(--accent), var(--accent3)); }
  .timeline-item { position:relative; margin:20px 0; }
  .timeline-item::before { content:''; position:absolute; left:-26px; top:6px; width:12px; height:12px; border-radius:50%; background:var(--accent); border:2px solid var(--bg); }
  .timeline-item:nth-child(even)::before { background:var(--accent3); }

  .section-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(340px, 1fr)); gap:12px; margin:16px 0; }
  .section-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:16px; cursor:pointer; transition:all .25s; }
  .section-card:hover { border-color:var(--accent); transform:translateY(-2px); box-shadow:0 8px 24px rgba(0,0,0,.3); }
  .section-card.expanded { grid-column:1/-1; }

  .lineage-cols { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin:16px 0; }
  @media(max-width:700px) { .lineage-cols { grid-template-columns:1fr; } }
  .lineage-col { background:var(--surface); border-radius:12px; padding:20px; }
  .lineage-col h3 { margin-top:0; }
  .lineage-col ul { list-style:none; padding:0; }
  .lineage-col li { padding:8px 0; border-bottom:1px solid var(--border); font-size:14px; color:var(--text2); }
  .lineage-col li:last-child { border:none; }

  .search-bar { position:relative; margin:16px 0; }
  .search-bar input { width:100%; padding:12px 16px 12px 40px; background:var(--surface); border:1px solid var(--border); border-radius:10px; color:var(--text); font-size:14px; outline:none; }
  .search-bar input:focus { border-color:var(--accent); }

  .question { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:16px 20px 16px 48px; margin:10px 0; position:relative; }
  .q-mark { position:absolute; left:16px; top:16px; width:24px; height:24px; background:var(--accent); color:white; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:14px; }

  .footer { text-align:center; padding:32px; color:var(--text2); font-size:12px; border-top:1px solid var(--border); margin-top:48px; }

  .pill { display:inline-flex; align-items:center; gap:6px; padding:6px 14px; border-radius:20px; font-size:13px; background:var(--surface); border:1px solid var(--border); color:var(--text2); margin:4px; }
  .dot { width:8px; height:8px; border-radius:50%; }
  .hidden { display:none !important; }
  .mermaid { background: transparent !important; }
  .mermaid svg { max-width: 100%; height: auto; }

  /* Algorithm box — CS paper style */
  .algo-box { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:0; margin:16px 0; overflow:hidden; }
  .algo-header { padding:14px 20px; border-bottom:1px solid var(--border); display:flex; gap:12px; align-items:baseline; }
  .algo-header .algo-num { font-weight:700; color:var(--accent); font-size:14px; }
  .algo-header .algo-name { font-size:14px; color:var(--text); }
  .algo-body { padding:16px 20px; font-size:14px; line-height:2.0; }
  .algo-req { color:var(--text2); margin-bottom:4px; font-size:13px; }
  .algo-req strong { color:var(--accent); font-weight:600; }
  .algo-sep { border:none; border-top:1px solid var(--border); margin:8px 0; }
  .algo-line { display:flex; align-items:baseline; gap:8px; min-height:28px; }
  .algo-ln { min-width:24px; text-align:right; color:var(--text2); font-size:12px; opacity:0.5; user-select:none; font-family:'Cascadia Code','Fira Code',monospace; }
  .algo-code { flex:1; }
  .algo-comment { color:var(--text2); font-size:12px; margin-left:8px; white-space:nowrap; opacity:0.7; }
  .algo-section { color:var(--accent2); font-size:12px; margin:8px 0 2px 32px; text-transform:uppercase; letter-spacing:0.5px; font-weight:600; }
  .algo-box .katex { font-size:0.95em; }
  .algo-box .katex .textsc { font-variant:small-caps; }
</style>

<script>
// All content data - hardcoded from RLM analysis (no untrusted input)
const TABS = [

  {id:"architecture", label:"3-Level Architecture"},

const SECTIONS = [
  {idx:1, title:"Abstract", thesis:"Phenomenal consciousness emerges from meaningful integration of affect and concepts, not raw qualia, dissolving traditional philosophical puzzles about consciousness.", concepts:["Raw qualia","Constructed emotion theory","Predictive processing","Meaningful integration","Core affect","Explanatory gap"], arguments:["Nagel\u2019s bat question assumes flawed ontology of pre-conceptual raw qualia that creates pseudoproblems.","Phenomenal consciousness constituted by meaningful integration from inception, not ineffable raw feels.","Problems of other minds, explanatory gap, and qualia privacy become tractable empirical questions about integration mechanisms.","Consciousness reframed as integration of biological core affect with culturally learned conceptual categories."]},
  {idx:2, title:"I. Introduction: The Seductive Error of Raw Qualia", thesis:"The intuition that phenomenal experience consists of raw, pre-conceptual qualia is a conceptual error; consciousness emerges from meaningful integration of affect and conceptual categories.", concepts:["Raw qualia","Phenomenal experience","Meaningful integration","Explanatory gap","Category error","Core affect"], arguments:["Raw qualia assumption commits a category error by positing pre-conceptual experience independent of meaning.","Conscious experiences emerge from synthesis of biological core affect with culturally learned conceptual categories.","The raw qualia assumption generates pseudoproblems that dissolve when we recognize their false premise.","Rejecting raw qualia enables productive integration of consciousness research with emotion theory and cultural neuroscience."]},
  {idx:3, title:"II. The Traditional Framework and Its Hidden Assumptions", thesis:"Nagel\u2019s consciousness question presupposes that experience is a substance-like, pre-conceptual, private phenomenon \u2014 assumptions inherited from philosophical tradition that commit a category error, generating pseudoproblems rather than genuine mysteries.", concepts:["Experience-as-substance","Pre-conceptual phenomenology","Phenomenal comparability","Privacy of qualia","The explanatory gap","Introspection as cognitive process"], arguments:["Nagel\u2019s \u2018what-it-is-like\u2019 formulation smuggles in four hidden assumptions about the nature of experience.","The raw qualia framework persists because introspection seems to reveal pure phenomenal qualities, but introspection itself can mislead.","Accepting raw qualia as foundational creates the explanatory gap while preventing better empirical questions.","The seeming givenness of raw experience may be an artifact of how consciousness presents itself, not its actual constitution."]},
  {idx:4, title:"III. The Alternative: Meaningful Integration", thesis:"Consciousness emerges from the integration of core affect (Level 1), foundational schemas (Level 2), and culturally learned concepts plus recursive self-modeling (Level 3a/3b) within predictive processing frameworks. The three levels are conditions of possibility for consciousness, their ordering logically entailed by four independent formalisms.", concepts:["Core affect","Core schemas","Conceptual categorization","Predictive integration","Attention schema theory","Proto-concepts","Kim's causal exclusion","Transcendental argument","Kant","Jonas","Thompson","Merleau-Ponty","Husserl","Sartre"], arguments:["Core affect (valence/arousal) provides biological foundation but is undifferentiated; consciousness requires integration with schemas and concepts.","Five core schemas (body, self, attention, spatial, affective-homeostatic) operate pre-reflectively to structure experience before linguistic concepts emerge.","Cultural emotion concepts constitute specific feelings by organizing core affect through schemas; cross-cultural variation proves concepts shape phenomenology.","The attention schema evolved for modeling others\u2019 awareness and applies this machinery to self-awareness.","Non-reductive physicalism: organizational description is causally indispensable.","The three levels are conditions of possibility for any consciousness, not merely one way consciousness happens to be organized"]},
  {idx:5, title:"IV. The Feeling of Consciousness: Social Prediction Redirected at Self", thesis:"Consciousness emerges when social prediction machinery recursively models the self, transforming valenced affect through schemas into self-referential computation.", concepts:["Strange loop as predictive mechanism","Recursive self-modeling","Valenced biological substrate (affect grounds subjectivity)","Self-referential computation bridging physics and phenomenology","Theory of mind recruited for self-modeling","Developmental progression from affect through schemas to recursion","Consciousness as inherently relational and social","Phylogenetic gradations correlating with social complexity","Frankish illusionism","Block access/phenomenal","Levine explanatory gap","Chalmers two-dimensional semantics","Constitutive functionalism","Shoemaker","Semantic parallel","Chinese Room"], arguments:["Consciousness feels like something because the brain models itself predictively for social navigation, not as a separate phenomenon.","The strange loop\u2019s recursive quality serves functional purpose: generating forward models of one\u2019s own future thoughts and behaviors.","Social prediction machinery (theory of mind) was evolutionarily recruited for self-modeling in the intensely social hominin lineage.","Consciousness emerges from raw signal \u2192 structured data \u2192 self-referential computation, paralleling information theory without metaphysical mystery.","Core affect is already minimally meaningful (valenced), so consciousness builds from meaningful substrate, not from utterly non-conscious matter.","Phenomenology IS the recursive self-modeling process experienced from within, not a separate by-product added to computation.","RSP is constitutive functionalism \u2014 phenomenal properties are constituted by functional organization, closest to Shoemaker\u2019s realization physicalism"]},

  {idx:6, title:"V. Evolutionary, Developmental, and Clinical Evidence", thesis:"The RSP architecture makes specific empirical claims about evolution, development, and clinical neuroscience. The evolutionary arc from core affect (~450 Mya) through schemas (~225-60 Mya) to recursive social prediction (~14 Mya) is confirmed by comparative evidence. Developmental data shows the predicted bottom-up construction order. Natural experiments (social deprivation) show the predicted Level 3-selective impairment.", concepts:["Evolutionary progression","Developmental ordering","Natural experiments","Corvid cognition","Cephalopods as boundary test case","Dunbar's number","Disorders of consciousness","Vegetative state","Minimally conscious state","Locked-in syndrome","PCI","Anesthesia"], arguments:["Level 1 core affect is conserved across vertebrates (~450 Mya heritage)","Level 2 schemas emerged sequentially in the mammalian lineage","Level 3 recursive social prediction elaborated in the hominin lineage, tracking social group size","Cultural extensions of Level 3 (language, institutions) emerged when groups exceeded Dunbar's number","Social deprivation consistently shows preserved Levels 1-2 with impaired Level 3","Corvid cognition suggests ecological demands can also drive cognitive sophistication","Disorders of consciousness map onto RSP levels: VS = Level 1 preserved, MCS = partial Level 2, locked-in = all levels intact","Cephalopods confirm RSP species predictions: high Level 1-2 capacity without Level 3, since solitary lifestyle provides no social selection pressure for recursive self-modeling.","The developmental sequence Level 1-2-3 is mathematically necessary: free energy (App B), intrinsically motivated RL (App C), and cascade control (App D) all require bottom-up construction."]},
  {idx:7, title:"VI. Objections and Replies: Addressing the Social-Predictive Account", thesis:"RSP theory dissolves traditional consciousness problems by reconceiving qualia as meaningfully integrated rather than raw, private properties.", concepts:["Meaningful integration","Intersubjective similarity","Core affect","Conceptual categories","Explanatory gap","Cultural variation in consciousness"], arguments:["Inverted spectrum becomes incoherent because concept learning depends on pattern-matching across modalities.","Problem of other minds dissolves by treating consciousness as empirically measurable functional architecture.","Explanatory gap dissolves when experiences are meaningful integrations; becomes standard scientific question.","Cultural variation in emotions is predicted: different conceptual categories constitute genuinely different feelings."]},
  {idx:8, title:"VII. What It\u2019s Like to Be a Bat: The Question Reframed", thesis:"Nagel\u2019s bat question misfires by assuming raw qualia; consciousness is instead structured meaningful integration through schemas shaped by ecology and architecture.", concepts:["Core schemas","Conceptual incommensurability","Schematic organization","Echolocation as structuring principle","Functional architecture","Comparative consciousness"], arguments:["Bat phenomenology depends on bat-specific conceptual categories shaped by ecology and sociality, not ineffable raw qualia.","Consciousness differences between species reflect differently structured schemas rather than incomparable raw feels.","Bat experience of echolocation is constituted by integration across all five schemas: body schema (flight + echo feedback), spatial schema (3D volumetric maps), attention schema (social roosting), self-schema (simpler than primate), and affective-homeostatic monitoring.","Empirical investigation of bat neural organization can answer tractable questions about bat consciousness."]},
  {idx:9, title:"VIII. Philosophical Implications and Objections", thesis:"RSP theory reframes the hard problem by showing consciousness as evolved schema-based integration, dissolving the explanatory gap from physical-mental to accessible self-models. Phenomenal consciousness comes in degrees: Level 1 valenced, Level 2 schematic, Level 3b self-aware.", concepts:["Hard problem of consciousness","Core schemas","Meaningful integration","Substrate independence","Proto-concepts","Phenomenology as structure experienced from within","Jackson's Mary (Knowledge Argument)","Graduated phenomenality","Level 3b vs Level 2","Merker","Decerebrate infants (Merker 2007)","Social-centricity qualification","Chalmers meta-problem","Carruthers constitutive HOT"], arguments:["Consciousness emerges gradually through increasingly sophisticated self-referential schemas accessible to action-selection systems.","Introspection reveals conceptually-structured experience presented as \u2018raw feel\u2019 due to processing speed, not meaning-independent qualia.","Meaningful integration is real consciousness, not eliminativism; organization itself constitutes phenomenology, like sound organization creates music.","Even simple organisms possess proto-concepts and foundational schemas enabling basic feelings, explaining consciousness as continuous rather than all-or-nothing.","Running a recursive self-model and describing it are distinct processes; Mary gains new integration, not access to a previously hidden quale.","The transcendental reading of RSP dissolves the zombie argument: if Level 3b is intact the subject position is constituted; if absent the zombie argument becomes empirical not metaphysical.","RSP resolves Chalmers meta-problem: the recursive self-model represents its own processing as having intrinsic phenomenal character, explaining why consciousness seems to resist functional explanation."]},
  {idx:10, title:"IX. Empirical Implications and Predictions", thesis:"RSP theory generates testable predictions about emotional granularity, cross-cultural phenomenology, development, neural damage, therapy, and social deprivation that empirical evidence supports.", concepts:["Emotional granularity","Schema-based consciousness","Recursive social prediction (Level 3)","Core affect","Social deprivation dissociation","Double dissociation"], arguments:["Teaching emotion concepts creates new phenomenology, not just vocabulary; granularity predicts better regulation and adaptive responding.","Cultures with unique emotion concepts show neural differences and untranslatable phenomenologies, demonstrating concepts constitute experience.","Developmental evidence shows layered emergence: core affect precedes schemas, which precede concepts.","Social deprivation produces selective Level 3 impairment while preserving Levels 1\u20132, creating a double dissociation."]},
  {idx:11, title:"X. Comparison with Alternative Views", thesis:"RSP is compared against 19 theories across 10 families, building on a scoping review of 38 consciousness models plus two post-review frameworks (Bennett\u2019s Stack Theory and Trukovich\u2019s R2R). RSP extends COI, AST, CSS, PToC, HOT, FOR, and Constructed Emotion; complements GWT/GNW, SPA, ART, CP, RPT, GT, Stack Theory, and R2R; and contradicts IIT and Orch OR. Three methodologically distinct frameworks (RSP, Stack Theory, R2R) converge on the thesis that consciousness is constituted by recursive self-modeling grounded in biological affect. No other theory combines RSP\u2019s seven unique properties: phenomenal mechanism, multi-timescale dynamics, five mathematical formalizations, developmental sequence, interoceptive foundation, content specificity, and a formal theory of intelligence.", concepts:["Global Workspace Theory (GWT/GNW)","Semantic Pointer Architecture (SPA)","Higher-Order Thought (HOT)","First-Order Representationalism (FOR)","Cross-Order Integration (COI)","Attention Schema Theory (AST)","Integrated Information Theory (IIT)","Adaptive Resonance Theory (ART)","Consciousness State Space (CSS)","Psychological Theory of Consciousness (PToC)","Centrencephalic Proposal (CP)","Recurrent Processing Theory (RPT)","Orchestrated Objective Reduction (Orch OR)","Basic Emotions Theory","Constructed Emotion (Barrett)","Gurwitsch\u2019s Theory (GT)","Stack Theory (Bennett, 2025)","Reaction to Reflection / R2R (Trukovich, 2025)"], arguments:["GWT/GNW explains access consciousness but not phenomenal character; RSP specifies why broadcasting feels like something via recursive self-modeling.","AST is closest competitor but lacks recursion, affect grounding, mathematical formalization, and developmental account that RSP provides.","IIT is architecture-neutral (any system with sufficient \u03A6); RSP is architecture-specific (requires three-level recursive architecture with specific content).","Quantum theories require speculative sub-neuronal mechanisms; RSP achieves formal rigor via classical dynamical systems with clear neural correlates.","Bennett\u2019s Stack Theory (2025) independently arrives at hierarchical, valence-grounded, recursively self-modeling architecture from computational learning theory. Complements RSP: Bennett provides optimality proof (w-maxing); RSP provides neurobiological specificity.","Trukovich\u2019s R2R model (2025) converges on the same identity claim (consciousness IS recursive self-modeling) from theoretical biology. Value Saturation parallels RSP\u2019s affect-grounding; perspectival entrapment is a candidate concept RSP can absorb.","Three-way consilience from methodologically distinct traditions (predictive coding, learning theory, theoretical biology) strengthens the shared core claim, though the traditions are not fully independent.","RSP uniquely combines mechanism for phenomenal character, five mathematical formalisms, developmental sequence, content specificity, and a formal theory of intelligence\u2014no other theory has all seven."]},
  {idx:12, title:"XI. Conclusion: Beyond the Bat", thesis:"RSP theory dissolves traditional consciousness puzzles by reconceptualizing experience as meaningful integration rather than raw qualia. Eight mathematical appendixes (A-H) formalize the architecture, including a formal theory of intelligence establishing constitutive identity between recursive social intelligence and consciousness. The new research program spans neuroscience, development, clinical psychology, comparative cognition, and AI.", concepts:["Meaningful integration","Raw qualia","Core affect","Conceptual categories","Predictive models","Intersubjectivity","Artificial consciousness (D_max criterion)","Eight appendixes (A-H)","Constitutive identity (App H)"], arguments:["Raw qualia assumption rests on conceptual confusion; experience cannot be separated from meaning like music from organized sound.","Conscious experiences emerge from synthesis of biological core affect and culturally learned concepts within predictive models.","Traditional consciousness puzzles assume pure meaning-independent phenomenology that doesn\u2019t exist; they need reframing rather than answering.","Understanding consciousness requires studying functional architectures enabling meaningful integration across species.","Artificial consciousness requires three architectural conditions: interoceptive monitoring (Level 1), embodied schemas (Level 2), and recursive self-modeling with D_max >= 3 (Level 3b). Current LLMs satisfy none.","Eight appendixes (A-H) prove the architecture is a mathematically specified dynamical system with provable convergence, measurable stability, and failure modes mapping onto psychopathology."]}
];

function buildTabs() {
  const bar = document.getElementById("tabBar");
  TABS.forEach((t, i) => {
    const div = document.createElement("div");
    div.className = "tab" + (i === 0 ? " active" : "");
    div.dataset.view = t.id;
    div.textContent = t.label;
    div.addEventListener("click", () => switchView(t.id));
    bar.appendChild(div);
  });
}

function renderRSPAlgorithm() {
  const container = document.getElementById("rsp-algo-container");
  if (!container || typeof katex === "undefined") return;

  var kOpts = {throwOnError:false, displayMode:false, macros:{"\\textsc":"\\textsf{#1}"}};
  var K = function(tex) { return katex.renderToString(tex, kOpts); };

  // Helper to build one algorithm line
  function algoLine(num, tex, comment, indent) {
    var pad = (indent || 0) * 20;
    var html = '<div class="algo-line">';
    html += '<span class="algo-ln">' + (num || '') + '</span>';
    html += '<span class="algo-code" style="padding-left:'+pad+'px">' + K(tex) + '</span>';
    if (comment) html += '<span class="algo-comment">' + K('\\triangleright\\;\\text{'+comment+'}') + '</span>';
    html += '</div>';
    return html;
  }

  function algoSection(text, color) {
    return '<div class="algo-section" style="color:'+color+'">' + text + '</div>';
  }

  var h = '';
  // Algorithm box
  h += '<div class="algo-box">';
  // Header
  h += '<div class="algo-header"><span class="algo-num">Algorithm 1</span>';
  h += '<span class="algo-name">Recursive Social Prediction (RSP) \u2014 Consciousness Generation Loop</span></div>';
  // Body
  h += '<div class="algo-body">';
  // Requirements
  h += '<div class="algo-req"><strong>Require:</strong> Sensory input '+K('\\mathbf{x}(t)')+', interoceptive input '+K('\\mathbf{i}(t)')+', social context '+K('\\mathcal{O}')+'</div>';
  h += '<div class="algo-req"><strong>Ensure:</strong> Phenomenal state '+K('\\Phi(t)')+', updated self-model '+K('\\mathcal{M}(t)')+'</div>';
  h += '<hr class="algo-sep">';

  // Level 1
  h += algoSection('Level 1: Core Affect \u2014 biological substrate', '#ff6b6b');
  h += algoLine(1, '\\mathbf{a}(t) \\gets \\textsc{InteroceptiveMonitor}(\\mathbf{i}(t))', 'valence + arousal');

  // Level 2
  h += algoSection('Level 2: Schema Integration \u2014 pre-reflective organization', '#ffd93d');
  h += algoLine(2, '\\textbf{for each } s \\in \\mathcal{S} \\textbf{ do}');
  h += algoLine(3, 's(t) \\gets \\textsc{UpdateSchema}(s(t\\!-\\!1),\\; \\mathbf{x}(t),\\; \\mathbf{a}(t))', null, 1);
  h += algoLine(4, '\\textbf{end for}');
  h += algoLine(5, '\\mathbf{z}(t) \\gets \\textsc{Integrate}(\\mathbf{a}(t),\\; \\{s(t) : s \\in \\mathcal{S}\\})', 'structured affect');

  // Level 3a
  h += algoSection('Level 3a: Conceptual Categorization \u2014 meaning construction', '#4ecdc4');
  h += algoLine(6, 'c^* \\gets \\arg\\max_{c \\in \\mathcal{C}} P(c \\mid \\mathbf{z}(t),\\; \\text{context})', 'predictive categorization');
  h += algoLine(7, '\\mathbf{e}(t) \\gets \\textsc{MeaningfulIntegration}(\\mathbf{z}(t),\\; c^*)', 'constituted experience');

  // Level 3b
  h += algoSection('Level 3b: Recursive Social Prediction \u2014 the strange loop', '#6c63ff');
  h += algoLine(8, '\\mathcal{M}(t) \\gets \\textsc{UpdateSelfModel}(\\mathcal{M}(t\\!-\\!1),\\; \\mathbf{e}(t))');
  h += algoLine(9, '\\textbf{for } d = 1 \\textbf{ to } D_{\\max} \\textbf{ do}', 'recursion depth');
  h += algoLine(10, '\\textbf{for each } o_j \\in \\mathcal{O} \\textbf{ do}', null, 1);
  // Comment has math (o_j), so build it manually instead of using the helper
  h += '<div class="algo-line"><span class="algo-ln">11</span>';
  h += '<span class="algo-code" style="padding-left:40px">' + K('\\hat{\\mathcal{M}}_j \\gets \\textsc{PredictSelfAsSeenBy}(\\mathcal{M}(t),\\; o_j)') + '</span>';
  h += '<span class="algo-comment">' + K('\\triangleright\\;\\text{how does } o_j \\text{ see me?}') + '</span></div>';
  h += algoLine(12, '\\textbf{end for}', null, 1);
  h += algoLine(13, '\\hat{\\mathcal{M}}^{(d)} \\gets \\textsc{Aggregate}(\\{\\hat{\\mathcal{M}}_j\\})', null, 1);
  h += algoLine(14, '\\mathcal{M}(t) \\gets \\textsc{RecursiveUpdate}(\\mathcal{M}(t),\\; \\hat{\\mathcal{M}}^{(d)})', 'strange loop closes', 1);
  h += algoLine(15, '\\textbf{end for}');

  // Temporal prediction
  h += algoSection('Temporal Prediction \u2014 stream of consciousness', '#a29bfe');
  h += algoLine(16, '\\hat{\\mathbf{e}}(t\\!+\\!1) \\gets \\textsc{PredictFutureState}(\\mathcal{M}(t),\\; \\mathbf{e}(t))');
  h += algoLine(17, '\\varepsilon(t) \\gets \\mathbf{e}(t) - \\hat{\\mathbf{e}}_{\\text{prev}}(t)', 'prediction error');
  h += algoLine(18, '\\mathcal{M}(t) \\gets \\textsc{UpdateOnError}(\\mathcal{M}(t),\\; \\varepsilon(t))');

  // Phenomenology
  h += algoSection('Phenomenology: the process experienced from within', '#ff9ff3');
  h += algoLine(19, '\\Phi(t) \\gets \\langle \\mathbf{e}(t),\\; \\mathcal{M}(t),\\; \\hat{\\mathbf{e}}(t\\!+\\!1) \\rangle', 'consciousness \u2261 this integrated state');
  h += algoLine(20, '\\textbf{return } \\Phi(t),\\; \\mathcal{M}(t)');

  h += '</div></div>';

  // Note about LaTeX file
  h += '<p style="margin-top:12px;font-size:13px;color:var(--text2);font-style:italic">Full LaTeX source with \\texttt{algorithm} and \\texttt{algpseudocode} packages available as <strong>recursive_social_prediction_algorithm.tex</strong></p>';

  container.innerHTML = h;
}

function switchView(id) {
  document.querySelectorAll(".tab").forEach(t => { t.classList.toggle("active", t.dataset.view === id); if (t.dataset.view === id) t.scrollIntoView({behavior:"smooth", block:"nearest"}); });
  document.querySelectorAll(".view").forEach(v => v.classList.toggle("active", v.id === id));
  // Render Mermaid + KaTeX when RSP tab first becomes visible
  if (id === "rsp" && !rspRendered) {
    rspRendered = true;
    // Mermaid diagram
    if (typeof mermaid !== "undefined") {
      var mc = document.getElementById("rsp-mermaid-container");
      if (mc) {
        mermaid.render("rsp-diagram-svg", RSP_DIAGRAM).then(function(result) {
          mc.innerHTML = result.svg;
        }).catch(function(err) {
          mc.textContent = "Diagram render error: " + err.message;
        });
      }
    }
    // KaTeX algorithm — wait for KaTeX to load (deferred script)
    if (typeof katex !== "undefined") {
      renderRSPAlgorithm();
    } else {
      // KaTeX still loading (defer), poll briefly
      var attempts = 0;
      var poll = setInterval(function() {
        attempts++;
        if (typeof katex !== "undefined") { clearInterval(poll); renderRSPAlgorithm(); }
        else if (attempts > 20) { clearInterval(poll); }
      }, 100);
    }
  }
  // Render Brain Mermaid when Brain tab first becomes visible
  if (id === "brain" && !brainRendered) {
    brainRendered = true;
    if (typeof mermaid !== "undefined") {
      var bc = document.getElementById("brain-mermaid-container");
      if (bc) {
        mermaid.render("brain-diagram-svg", BRAIN_DIAGRAM).then(function(result) {
          bc.innerHTML = result.svg;
        }).catch(function(err) {
          bc.textContent = "Diagram render error: " + err.message;
        });
      }
    }
  }
  // Initialize RSP Simulation when tab first becomes visible
  if (id === "simulation" && !simRendered) {
    simRendered = true;
    if (typeof initSimulation === "function") initSimulation();
  }
}

function el(tag, attrs, ...children) {
  const e = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k,v]) => {
    if (k === "class") e.className = v;
    else if (k.startsWith("on")) e.addEventListener(k.slice(2), v);
    else if (k === "style" && typeof v === "object") Object.assign(e.style, v);
    else e.setAttribute(k, v);
  });
  children.forEach(c => {
    if (typeof c === "string") e.appendChild(document.createTextNode(c));
    else if (c) e.appendChild(c);
  });
  return e;
}

function elHTML(tag, attrs, html) {
  // Only used for trusted, hardcoded content from our analysis data
  const e = el(tag, attrs);
  e.innerHTML = html;
  return e;
}

  [

function buildClinical() {
  const v = el("div", {class:"view", id:"clinical"});
  v.appendChild(elHTML("h1", null, "Clinical Evidence"));
  v.appendChild(el("p", null, "When the recursive self-modeling loop breaks down, specific consciousness deficits emerge \u2014 each illuminating a different component of the RSP architecture. These clinical cases provide a functional anatomy of consciousness."));
  v.appendChild(elHTML("p", {style:{marginTop:"8px",fontSize:"13px",color:"var(--accent3)",fontStyle:"italic"}}, "This clinical evidence is now integrated into the paper body as <strong>\u00a7VIII, Prediction 6: Clinical Dissociations Should Map the RSP Architecture</strong>."));

  // Self-Model Failures
  v.appendChild(el("h2", null, "Self-Model Failures"));
  v.appendChild(el("p", {style:{marginBottom:"12px"}}, "These conditions reveal what happens when the brain\u2019s model of itself \u2014 the recursive \u201cwho am I?\u201d loop \u2014 malfunctions at different points."));

  [["Thought Insertion (Schizophrenia)","Patients experience thoughts as alien, inserted by external forces. The self-model that should tag \u2018I generated this thought\u2019 is not functioning. The prediction loop fails to attribute internally generated mental states to the self, so they feel foreign. This is not a metaphor \u2014 it is a direct failure of the recursive self-modeling process described in Algorithm 1, line 8: the self-model update step misfires.","#ff6b6b","Level 3b: Self-attribution","Frith (1992); Blakemore et al. (2003)"],
   ["Cotard\u2019s Delusion","Patients believe they are dead, do not exist, or have lost their organs. The self-model has become so impoverished that it generates the prediction \u2018I do not exist\u2019 \u2014 yet the system continues to process and report on this prediction. The recursive loop still runs but models a non-self, creating the paradox of a conscious being asserting its own non-existence. This is the strange loop turned inside out.","#a29bfe","Level 3b: Self-existence modeling","Young & Leafhead (1996); Gerrans (2000)"],
   ["Depersonalization / Derealization","Patients feel detached from their own mental processes, observing themselves as if from outside. The self-model still operates but is not properly integrated with first-person experience. The recursive loop runs in \u2018spectator mode\u2019 \u2014 predictions about the self are generated but not felt as belonging to the self. The phenomenology shifts from \u2018I think\u2019 to \u2018something is thinking.\u2019","#4ecdc4","Level 3b: Integration with phenomenology","Sierra & Berrios (1998); Medford et al. (2005)"],
   ["Dissociative Identity Disorder","Multiple self-models coexist within one neural substrate, each with its own recursive loop, predictive patterns, and phenomenological character. DID demonstrates that the self-model is not a fixed property of the brain but a constructed prediction \u2014 and that the construction process can fork. Each identity maintains its own Level 3 strange loop with different conceptual categories and social predictions.","#ff9ff3","Level 3b: Self-model multiplicity","Putnam (1989); Reinders et al. (2003)"]
  ].forEach(([title, desc, color, level, sources]) => {
    const card = el("div", {class:"card", style:{borderColor:color+"40"}});
    card.appendChild(el("div", {class:"card-label", style:{color:color}}, title));
    card.appendChild(el("p", null, desc));
    const meta = el("div", {style:{marginTop:"12px",display:"flex",flexWrap:"wrap",gap:"8px"}});
    meta.appendChild(el("span", {class:"tag tag-purple"}, level));
    meta.appendChild(el("span", {class:"tag tag-gold"}, sources));
    card.appendChild(meta);
    v.appendChild(card);
  });

  // Prediction & Agency Failures
  v.appendChild(el("h2", null, "Prediction & Agency Failures"));
  v.appendChild(el("p", {style:{marginBottom:"12px"}}, "These conditions show what happens when the temporal prediction components of the RSP model break down \u2014 the ability to predict one\u2019s own future states and attribute agency to one\u2019s actions."));

  [["Frontal Lobe Damage","Patients lose impulse inhibition \u2014 they cannot predict \u2018if I say this, I\u2019ll feel regret later\u2019 because the self-model enabling future state prediction is damaged. The temporal prediction loop (Algorithm 1, lines 16\u201318) is impaired: the system cannot generate accurate predictions of its own future phenomenal states. Without this, the \u2018stream of consciousness\u2019 loses its forward momentum.","#ffd93d","Temporal prediction loop","Damasio (1994); Bechara & Damasio (2005)"],
   ["Alien Hand Syndrome","The hand performs purposeful actions that the patient does not experience as self-initiated. The motor command is generated, but the self-model does not predict it \u2014 creating a prediction error so large that agency is denied entirely. The hand belongs to the body schema (Level 2) but is disconnected from the self-model (Level 3). Actions without recursive self-prediction feel alien.","#ff6b6b","Level 2\u20133 disconnection","Della Sala et al. (1991); Marchetti & Della Sala (1998)"],
   ["Anosognosia","Patients deny obvious disabilities (e.g., paralysis after stroke). The self-model cannot update to incorporate new information about the body. The recursive update step (line 14) is blocked \u2014 the self-model keeps predicting a functional body despite contradictory evidence. This reveals that the self-model is not a passive mirror but an active prediction that can resist disconfirmation.","#4ecdc4","Level 3b: Model update failure","Ramachandran (1996); Prigatano (2010)"],
   ["Phantom Limb","Patients feel vivid sensations in amputated limbs. The body schema (Level 2) persists in predicting a limb that no longer exists \u2014 and the self-model (Level 3) integrates these predictions into phenomenal experience. The prediction continues without sensory confirmation, demonstrating that consciousness is generated by the predictive model, not by sensory input.","#a29bfe","Level 2: Schema persistence","Ramachandran & Hirstein (1998); Melzack (1990)"]
  ].forEach(([title, desc, color, level, sources]) => {
    const card = el("div", {class:"card", style:{borderColor:color+"40"}});
    card.appendChild(el("div", {class:"card-label", style:{color:color}}, title));
    card.appendChild(el("p", null, desc));
    const meta = el("div", {style:{marginTop:"12px",display:"flex",flexWrap:"wrap",gap:"8px"}});
    meta.appendChild(el("span", {class:"tag tag-green"}, level));
    meta.appendChild(el("span", {class:"tag tag-gold"}, sources));
    card.appendChild(meta);
    v.appendChild(card);
  });

  // Social Prediction Failures
  v.appendChild(el("h2", null, "Social Prediction Failures"));
  v.appendChild(el("p", {style:{marginBottom:"12px"}}, "Because consciousness in the RSP model is fundamentally social \u2014 built from machinery evolved to model other minds \u2014 disruptions to social cognition should produce distinctive consciousness alterations."));

  [["Capgras Delusion","Patients recognize familiar faces but believe the person has been replaced by an identical impostor. The visual recognition system works, but the social-predictive model generates a massive prediction error: \u2018this person looks like my wife but does not feel like my wife.\u2019 The affective prediction (Level 3a) is disconnected from the perceptual input, revealing that social recognition depends on predictive modeling, not just pattern matching.","#ff6b6b","Level 1-2 integration failure with Level 3 delusional interpretation","Ellis & Young (1990); Hirstein & Ramachandran (1997)"],
   ["Autism Spectrum Differences","Differences in social prediction machinery produce systematically different phenomenology. Individuals on the autism spectrum often show preserved or enhanced Level 1\u20132 processing (sometimes heightened sensory awareness) with differences in Level 3 recursive social modeling \u2014 difficulty predicting others\u2019 mental states and, in turn, differences in the recursive self-model that depends on those other-models. This is not a deficit but a different configuration of the RSP architecture.","#4ecdc4","Level 3b: Social recursion variation","Baron-Cohen (1995); Frith (2003); Lombardo et al. (2010)"],
   ["Prosopagnosia","The inability to recognize faces disrupts the \u2018other-models\u2019 component of the strange loop (Algorithm 1, line 10\u201312). Without stable other-models, the \u2018predict self as seen by others\u2019 step is impaired. Patients often report changes in social phenomenology: social situations feel different, less rich, more anxious \u2014 because the recursive social prediction loop cannot properly engage.","#ffd93d","Level 3b: Other-model construction","Duchaine & Nakayama (2006); Behrmann et al. (2005)"],
   ["Hemispatial Neglect","Patients completely ignore one half of space \u2014 even denying ownership of their own left arm. The spatial schema (Level 2) and attention schema (Level 2) are disrupted, and the self-model (Level 3) is updated to exclude an entire spatial hemisphere from consciousness. These patients do not experience a gap \u2014 their phenomenal world is simply smaller. Consciousness is what the predictive model predicts.","#a29bfe","Level 2\u20133: Schema-model integration","Bisiach & Luzzatti (1978); Driver & Mattingley (1998)"]
  ].forEach(([title, desc, color, level, sources]) => {
    const card = el("div", {class:"card", style:{borderColor:color+"40"}});
    card.appendChild(el("div", {class:"card-label", style:{color:color}}, title));
    card.appendChild(el("p", null, desc));
    const meta = el("div", {style:{marginTop:"12px",display:"flex",flexWrap:"wrap",gap:"8px"}});
    meta.appendChild(el("span", {class:"tag tag-red"}, level));
    meta.appendChild(el("span", {class:"tag tag-gold"}, sources));
    card.appendChild(meta);
    v.appendChild(card);
  });

  // Summary
  const summary = el("div", {class:"card", style:{borderColor:"var(--accent)",background:"rgba(108,99,255,0.08)"}});
  summary.appendChild(el("div", {class:"card-label"}, "The Clinical Logic"));
  summary.appendChild(el("p", null, "Each clinical condition maps onto a specific component of the RSP algorithm. Self-model failures (Cotard\u2019s, DID, depersonalization) disrupt the strange loop itself. Prediction failures (frontal damage, alien hand, anosognosia) break the temporal prediction cycle. Social prediction failures (Capgras, autism, prosopagnosia) impair the other-modeling that feeds recursive self-prediction. No single clinical case proves the RSP model, but the systematic mapping of symptoms to architectural components provides a powerful pattern of converging evidence."));
  summary.appendChild(el("p", {style:{marginTop:"8px"}}, "Crucially, these deficits are selective. A patient with Capgras delusion does not lose all consciousness \u2014 they lose the specific component the model predicts they should lose. A patient with anosognosia is conscious but cannot update one aspect of their self-model. This selective impairment is the hallmark of a genuine architectural theory rather than a vague philosophical gesture."));
  v.appendChild(summary);

  var src = el("div", {class:"card", style:{marginTop:"16px"}});
  src.appendChild(el("div", {class:"card-label"}, "Key Sources"));
  var srcPills = el("div", {style:{display:"flex",flexWrap:"wrap",gap:"6px",marginTop:"8px"}});
  ["Ramachandran (1996)","Sierra & Berrios (1998)","Putnam (1989)","Ellis & Young (1990)","Young & Leafhead (1996)","Giacino et al. (2014)","Casali et al. (2013)","Owen et al. (2006)"].forEach(function(s) { srcPills.appendChild(el("span",{class:"tag tag-red"},s)); });
  src.appendChild(srcPills);
  v.appendChild(src);

  return v;
}

function buildDeprivation() {
  const v = el("div", {class:"view", id:"deprivation"});
  v.appendChild(elHTML("h1", null, "Natural Experiments"));
  v.appendChild(el("p", null, "The strongest empirical support for Level 3\u2019s social-predictive architecture comes from cases where human biology is intact but social interaction is absent. These \u2018natural experiments\u2019 consistently show preserved Levels 1\u20132 with selectively impoverished Level 3 \u2014 exactly what the RSP model predicts and what no rival theory anticipates."));
  v.appendChild(elHTML("p", {style:{marginTop:"8px",fontSize:"13px",color:"var(--accent3)",fontStyle:"italic"}}, "This evidence is now integrated into the paper body in <strong>\u00a7IV (Natural Experiments)</strong> and <strong>\u00a7VIII, Prediction 7: Social Deprivation Should Selectively Impair Level 3</strong>."));

  predBox.appendChild(elHTML("p", null, "If Level 3 consciousness requires <strong>social calibration</strong> of the recursive self-modeling loop, then humans raised without social interaction should show: <strong>(a)</strong> intact core affect (Level 1), <strong>(b)</strong> functional body, spatial, and basic schemas (Level 2), but <strong>(c)</strong> devastated theory of mind, emotional granularity, and recursive self-consciousness (Level 3). Every documented case confirms this prediction."));

  // Cases
  v.appendChild(el("h2", null, "Extreme Isolation Cases"));

  [["Genie Wiley (Curtiss, 1977)",
    "Confined to a dark room strapped to a potty chair until age 13, with virtually zero social interaction. Her father beat her for making noise; her blind mother was not permitted to interact with her.",

     "Despite years of rehabilitation, Level 3 capacities never fully developed \u2014 consistent with a critical period for the recursive social-predictive loop"],
    "#ff6b6b"],
   ["Kaspar Hauser (1828)",

    ["Upon emergence: could barely walk, had no language, appeared to have intact sensory processing but overwhelming responses to stimuli (Level 1 hypersensitivity)",

     "Could not understand deception, sarcasm, or social hierarchy \u2014 precisely the recursive social predictions (Level 3b) that require calibration through experience",

   ["Oxana Malaya (raised by dogs, ages 3\u20138)",

    ["Level 1 intact: clear emotional responses \u2014 fear of separation, pleasure at food, distress signals",
     "Level 2 adapted: body schema reconfigured for quadrupedal movement; spatial schemas functional but canine-calibrated",
     "Level 3 absent at rescue: no human language, no self-recognition in mirrors, no theory of mind, no emotional vocabulary",
     "After rehabilitation: acquired basic language and some social skills, but theory of mind and emotional granularity remain significantly impaired into adulthood",
     "Now lives in a supervised residential facility \u2014 can perform simple tasks but cannot navigate complex social situations independently"],
    "#4ecdc4"],
   ["Victor of Aveyron (Itard, 1801)",
    "Found living wild in the forests of southern France at approximately age 12. The physician Jean Marc Gaspard Itard spent five years attempting to educate him, documenting one of the first systematic case studies of social deprivation.",
    ["Intact approach/avoidance responses and sensory-motor schemas: could forage, navigate terrain, respond to temperature",

  ].forEach(([title, context, points, color]) => {

  // Institutional deprivation
  v.appendChild(el("h2", null, "Institutional Deprivation Studies"));
  v.appendChild(el("p", {style:{marginBottom:"12px"}}, "Unlike individual case studies, institutional deprivation affects hundreds of children under semi-controlled conditions \u2014 providing statistical power that individual cases cannot."));

  [["Romanian Orphanage Studies (Nelson, Fox & Zeanah, 2014)",
    "The Bucharest Early Intervention Project (BEIP) is the only randomized controlled trial of foster care vs. institutional rearing \u2014 a gold-standard study design applied to a natural experiment in social deprivation.",
    ["136 institutionalized children randomly assigned to continued institutional care or high-quality foster care",
     "Core affect present in all children (Level 1): displayed distress, pleasure, arousal responses regardless of condition",
     "Basic schemas functional (Level 2): all children developed body awareness, spatial navigation, basic motor skills",
     "Level 3 profoundly impaired in institutional group: reduced cortical gray matter specifically in social cognition regions (TPJ, mPFC)",

     "Foster care group placed before age 2 recovered significantly more Level 3 function: better theory of mind, emotional regulation, and self-awareness",
     "Foster care after age 2 showed less recovery, defining a sensitive period window for the recursive social-predictive loop",
     "EEG studies showed reduced alpha power and atypical neural oscillation patterns in institutional children \u2014 normalizing only in the early-placed foster care group"],
    "#ffd93d"],
   ["English and Romanian Adoptees Study (Rutter et al., 1998\u20132017)",
    "The ERA study followed 165 Romanian orphans adopted into UK families, tracked from adoption through age 25 \u2014 the longest longitudinal study of institutional deprivation outcomes.",

     "Crucially, IQ recovered substantially even in late-adopted children \u2014 but social-recursive cognition did not, demonstrating that Level 3 deficits are not simply general cognitive delays"],
    "#ff6b6b"],
   ["Koluchov\u00e1 Twins (1972, 1976)",
    "Identical twin boys in Czechoslovakia were confined by a stepmother from 18 months to age 7 in a cellar with minimal human contact. A critical recovery case.",

  v.appendChild(el("h2", null, "Beyond Dunbar\u2019s Number: Bands to Cities"));

  [["Hunter-Gatherer Bands (300 Kya \u2013 12 Kya)",
