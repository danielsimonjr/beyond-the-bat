<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Figure 3: Theory Comparison</title>

  <line x1="280" y1="270" x2="160" y2="150" stroke="#ddd" stroke-width="1"/>

  <!-- Grid rings (3 levels: 33%, 66%, 100%) -->
  <polygon points="280,213 320,190 337,270 320,350 280,327 240,350 223,270 240,190" fill="none" stroke="#eee" stroke-width="1"/>
  <polygon points="280,157 360,150 393,270 360,390 280,383 200,390 167,270 200,150" fill="none" stroke="#eee" stroke-width="1"/>
  <polygon points="280,100 400,150 450,270 400,390 280,440 160,390 110,270 160,150" fill="none" stroke="#eee" stroke-width="1"/>

  <text x="412" y="140" class="axis-label">Empirical</text>
  <text x="412" y="130" class="axis-label">Predictions</text>
  <text x="468" y="274" class="axis-label">Clinical</text>
  <text x="468" y="264" class="axis-label">Mapping</text>
  <text x="412" y="408" class="axis-label">Developmental</text>
  <text x="412" y="398" class="axis-label">Account</text>
  <text x="280" y="458" class="axis-label">Evolutionary</text>
  <text x="280" y="468" class="axis-label">Grounding</text>
  <text x="148" y="408" class="axis-label">Dissolution</text>
  <text x="148" y="398" class="axis-label">of Hard Problem</text>
  <text x="92" y="274" class="axis-label">Cross-Theory</text>
  <text x="92" y="264" class="axis-label">Integration</text>
  <text x="148" y="140" class="axis-label">Architectural</text>
  <text x="148" y="130" class="axis-label">Specificity</text>

  <!-- RSP polygon (high on all dimensions) -->
  <polygon points="280,110 388,158 438,270 388,382 280,424 168,374 124,270 172,158"
    fill="rgba(192,57,43,0.15)" stroke="#c0392b" stroke-width="2.5"/>

  <circle cx="388" cy="158" r="4" fill="#c0392b"/>

  <line x1="518" y1="210" x2="540" y2="210" stroke="#27ae60" stroke-width="2" stroke-dasharray="4,4"/>

  <line x1="518" y1="235" x2="540" y2="235" stroke="#8e44ad" stroke-width="2" stroke-dasharray="2,3"/>
  <text x="546" y="239" class="legend-text">HOT</text>
  <line x1="518" y1="260" x2="540" y2="260" stroke="#e67e22" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="546" y="264" class="legend-text">Bennett</text>

  <!-- Score annotations for RSP -->
  <text x="560" y="310" font-size="9" fill="#888" text-anchor="middle">Outer ring = high</text>
  <text x="560" y="324" font-size="9" fill="#888" text-anchor="middle">Center = low</text>

  <!-- Caption -->
  <text x="320" y="500" text-anchor="middle" font-size="10" fill="#555">RSP (solid red) scores high across all eight dimensions. IIT (blue dashed) excels in formalization</text>
  <text x="320" y="514" text-anchor="middle" font-size="10" fill="#555">but lacks developmental grounding. GWT (green) has strong empirical support but weaker formalization.</text>
  <text x="320" y="528" text-anchor="middle" font-size="10" fill="#555">HOT (purple) provides moderate coverage. See Section X for detailed comparisons of 18 theories across 10 families.</text>
